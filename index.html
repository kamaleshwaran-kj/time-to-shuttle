<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS - Time To Shuttle | Playo Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { border-bottom: 4px solid #FDE047; color: #FDE047; }
        .bg-british-green { background-color: #004225; }
        .text-british-green { color: #004225; }
        .slot-selected { background-color: #004225 !important; color: #FDE047 !important; border-color: #004225 !important; }
    </style>
</head>
<body class="bg-white font-sans text-gray-900 pb-24">

    <div class="relative h-72 bg-british-green">
        <img src="https://images.unsplash.com/photo-1626225967045-9410f1c3722a?q=80&w=2070&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
        <div class="absolute top-4 left-4">
            <button class="bg-white/20 p-2 rounded-full text-white backdrop-blur-md"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div class="absolute bottom-6 left-6 text-white">
            <h1 class="text-3xl font-extrabold tracking-tight">TTS - Time To Shuttle</h1>
            <p class="text-sm font-medium opacity-80 mt-1">Alagapuram, Salem</p>
        </div>
    </div>

    <div class="flex border-b sticky top-0 bg-white z-50">
        <button onclick="switchTab('book')" id="tab-book" class="flex-1 py-4 text-sm font-bold active-tab">BOOK</button>
        <button onclick="switchTab('about')" id="tab-about" class="flex-1 py-4 text-sm font-bold text-gray-400">ABOUT</button>
        <button onclick="switchTab('amenities')" id="tab-amenities" class="flex-1 py-4 text-sm font-bold text-gray-400">AMENITIES</button>
    </div>

    <div id="content-book" class="p-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-lg">Badminton</h3>
            <span class="text-british-green font-bold">₹200/hr</span>
        </div>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button class="bg-gray-100 px-6 py-2 rounded-full text-xs font-bold border-2 border-transparent hover:border-british-green">Court 1</button>
            <button class="bg-gray-100 px-6 py-2 rounded-full text-xs font-bold border-2 border-transparent">Court 2</button>
            <button class="bg-gray-100 px-6 py-2 rounded-full text-xs font-bold border-2 border-transparent">Court 3</button>
            <button class="bg-gray-100 px-6 py-2 rounded-full text-xs font-bold border-2 border-transparent">Court 4</button>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button onclick="toggle(this, '09:00 AM')" class="border border-gray-200 py-3 rounded-lg text-sm font-semibold">09:00 AM</button>
            <button onclick="toggle(this, '10:00 AM')" class="border border-gray-200 py-3 rounded-lg text-sm font-semibold">10:00 AM</button>
            <button onclick="toggle(this, '11:00 AM')" class="border border-gray-200 py-3 rounded-lg text-sm font-semibold">11:00 AM</button>
            <button onclick="toggle(this, '04:00 PM')" class="border border-gray-200 py-3 rounded-lg text-sm font-semibold">04:00 PM</button>
            <button onclick="toggle(this, '05:00 PM')" class="border border-gray-200 py-3 rounded-lg text-sm font-semibold">05:00 PM</button>
            <button onclick="toggle(this, '06:00 PM')" class="border border-gray-200 py-3 rounded-lg text-sm font-semibold">06:00 PM</button>
        </div>
    </div>

    <div id="footer-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center translate-y-full transition-all">
        <div>
            <p id="total-text" class="text-xs text-gray-500 font-bold uppercase">1 Slot Selected</p>
            <p id="price-text" class="text-xl font-black text-british-green">₹200</p>
        </div>
        <button onclick="book()" class="bg-british-green text-bold-yellow px-12 py-3 rounded-lg font-black tracking-wide">CONTINUE</button>
    </div>

    <script>
        let selected = [];
        function toggle(btn, time) {
            btn.classList.toggle('slot-selected');
            const idx = selected.indexOf(time);
            if(idx > -1) selected.splice(idx, 1);
            else selected.push(time);
            
            const bar = document.getElementById('footer-bar');
            if(selected.length > 0) {
                bar.classList.remove('translate-y-full');
                document.getElementById('total-text').innerText = `${selected.length} Slots Selected`;
                document.getElementById('price-text').innerText = `₹${selected.length * 200}`;
            } else {
                bar.classList.add('translate-y-full');
            }
        }

        function switchTab(tab) {
            // Add tab switching logic here to hide/show content
            alert("Switching to " + tab + " view (Playo Style)");
        }

        function book() {
            const msg = `Booking TTS Salem: ${selected.join(', ')}`;
            window.open(`https://api.whatsapp.com/send?phone=919876543210&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
